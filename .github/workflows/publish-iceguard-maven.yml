name: Publish IceGuard Maven Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set immutable artifact version
        run: |
          current_version="$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)"
          base_version="${current_version%%-iceguard.*}"
          base_version="${base_version%-SNAPSHOT}"
          artifact_version="${base_version}-iceguard.$(git rev-parse --short=12 HEAD)"
          mvn -B org.codehaus.mojo:versions-maven-plugin:2.21.0:set \
            -DnewVersion="${artifact_version}" \
            -DgenerateBackupPoms=false
          echo "Publishing ${artifact_version}"

      - name: Publish Maven artifacts
        run: mvn -B deploy -DskipTests -s .github/settings.xml
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}
